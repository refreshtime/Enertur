<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Enertur - Gerador de Proposta Solar</title>
  <style>
    :root {
      --primary: #f5a623;
      --primary-dark: #d4891a;
      --accent: #1a3c5e;
      --accent-light: #2a5a8a;
      --bg: #f4f6f9;
      --card: #ffffff;
      --text: #222;
      --muted: #666;
      --border: #dde1e7;
      --success: #27ae60;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Segoe UI', Arial, sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
    }

    /* ── Header ── */
    header {
      background: var(--accent);
      color: #fff;
      padding: 18px 32px;
      display: flex;
      align-items: center;
      gap: 16px;
    }
    header .logo {
      font-size: 26px;
      font-weight: 800;
      letter-spacing: 1px;
    }
    header .logo span { color: var(--primary); }
    header p { font-size: 13px; opacity: .75; margin-top: 2px; }

    /* ── Layout ── */
    .container {
      max-width: 1100px;
      margin: 32px auto;
      padding: 0 16px;
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 24px;
    }

    @media (max-width: 760px) {
      .container { grid-template-columns: 1fr; }
    }

    /* ── Cards ── */
    .card {
      background: var(--card);
      border-radius: 12px;
      box-shadow: 0 2px 12px rgba(0,0,0,.07);
      padding: 28px;
    }
    .card h2 {
      font-size: 15px;
      text-transform: uppercase;
      letter-spacing: .8px;
      color: var(--accent);
      border-bottom: 2px solid var(--primary);
      padding-bottom: 10px;
      margin-bottom: 22px;
    }
    .card.full { grid-column: 1 / -1; }

    /* ── Form ── */
    .field { margin-bottom: 16px; }
    label {
      display: block;
      font-size: 12px;
      font-weight: 600;
      color: var(--muted);
      text-transform: uppercase;
      letter-spacing: .5px;
      margin-bottom: 5px;
    }
    input, select, textarea {
      width: 100%;
      padding: 10px 13px;
      border: 1.5px solid var(--border);
      border-radius: 8px;
      font-size: 14px;
      color: var(--text);
      background: #fafbfc;
      transition: border-color .2s;
      font-family: inherit;
    }
    input:focus, select:focus, textarea:focus {
      outline: none;
      border-color: var(--primary);
      background: #fff;
    }
.row { display: flex; gap: 12px; }
    .row .field { flex: 1; }

    /* Radio group */
    .radio-group { display: flex; gap: 10px; flex-wrap: wrap; }
    .radio-group label {
      text-transform: none;
      font-weight: 500;
      font-size: 13px;
      color: var(--text);
      display: flex;
      align-items: center;
      gap: 5px;
      cursor: pointer;
      padding: 8px 14px;
      border: 1.5px solid var(--border);
      border-radius: 8px;
      transition: all .2s;
      background: #fafbfc;
    }
    .radio-group input[type=radio] { width: auto; }
    .radio-group label:has(input:checked) {
      border-color: var(--primary);
      background: #fff8ee;
      color: var(--accent);
      font-weight: 700;
    }

    /* Toggle battery */
    .toggle-wrap {
      display: flex;
      align-items: center;
      gap: 10px;
      margin-bottom: 10px;
    }
    .toggle {
      position: relative;
      width: 44px;
      height: 24px;
      flex-shrink: 0;
    }
    .toggle input { opacity: 0; width: 0; height: 0; }
    .toggle .slider {
      position: absolute;
      inset: 0;
      background: var(--border);
      border-radius: 24px;
      cursor: pointer;
      transition: .3s;
    }
    .toggle .slider::before {
      content: '';
      position: absolute;
      height: 18px; width: 18px;
      left: 3px; bottom: 3px;
      background: #fff;
      border-radius: 50%;
      transition: .3s;
    }
    .toggle input:checked + .slider { background: var(--primary); }
    .toggle input:checked + .slider::before { transform: translateX(20px); }
    .toggle-label { font-size: 13px; font-weight: 600; color: var(--muted); }

    /* ── Proposal preview ── */
    #preview {
      background: #fff;
      border-radius: 12px;
      box-shadow: 0 2px 12px rgba(0,0,0,.07);
      padding: 36px 40px;
      grid-column: 1 / -1;
      display: none;
    }
    #preview.visible { display: block; }

    .proposal-header {
      display: flex;
      justify-content: space-between;
      align-items: flex-start;
      margin-bottom: 30px;
      padding-bottom: 20px;
      border-bottom: 3px solid var(--primary);
    }
    .proposal-logo {
      font-size: 30px;
      font-weight: 900;
      color: var(--accent);
      letter-spacing: 1px;
    }
    .proposal-logo span { color: var(--primary); }
    .proposal-meta { text-align: right; font-size: 12px; color: var(--muted); }
    .proposal-meta strong { color: var(--text); font-size: 13px; }

    .proposal-client { margin-bottom: 24px; }
    .proposal-client h3 { font-size: 13px; color: var(--muted); margin-bottom: 4px; text-transform: uppercase; }
    .proposal-client p { font-size: 18px; font-weight: 700; color: var(--accent); }
    .proposal-client .addr { font-size: 13px; color: var(--muted); font-weight: 400; }

    .p-client-banner {
      background: var(--accent);
      color: #fff;
      border-radius: 10px;
      padding: 18px 24px;
      margin-bottom: 22px;
    }
    .p-client-label { font-size: 11px; text-transform: uppercase; letter-spacing: .8px; opacity: .7; }
    .p-client-name  { font-size: 26px; font-weight: 900; margin-top: 4px; }
    .p-client-addr  { font-size: 13px; opacity: .75; margin-top: 4px; }

    .spec-grid {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 14px;
      margin-bottom: 24px;
    }
    @media (max-width: 600px) { .spec-grid { grid-template-columns: 1fr 1fr; } }

    .spec-box {
      background: var(--bg);
      border-radius: 10px;
      padding: 14px 16px;
      border-left: 4px solid var(--primary);
    }
    .spec-box .spec-label { font-size: 11px; color: var(--muted); text-transform: uppercase; letter-spacing: .5px; }
    .spec-box .spec-value { font-size: 20px; font-weight: 800; color: var(--accent); margin-top: 2px; }
    .spec-box .spec-sub { font-size: 11px; color: var(--muted); margin-top: 2px; }

    .investment-banner {
      background: linear-gradient(135deg, #2d6a2d, #3a8a3a);
      color: #fff;
      border-radius: 12px;
      padding: 22px 28px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 16px;
      flex-wrap: wrap;
      gap: 12px;
    }
    .investment-banner .inv-label { font-size: 14px; opacity: .85; }
    .investment-banner .inv-value { font-size: 32px; font-weight: 900; color: #a8f0a8; }
    .investment-banner .inv-sub { font-size: 13px; opacity: .75; }

    .economy-banner {
      background: linear-gradient(135deg, var(--accent), var(--accent-light));
      color: #fff;
      border-radius: 12px;
      padding: 22px 28px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 24px;
      flex-wrap: wrap;
      gap: 12px;
    }
    .economy-banner .eco-label { font-size: 14px; opacity: .85; }
    .economy-banner .eco-value { font-size: 32px; font-weight: 900; color: var(--primary); }
    .economy-banner .eco-year { font-size: 13px; opacity: .75; }

    .detail-table { width: 100%; border-collapse: collapse; font-size: 13px; }
    .detail-table th {
      background: var(--accent);
      color: #fff;
      padding: 10px 14px;
      text-align: left;
      font-size: 12px;
      text-transform: uppercase;
      letter-spacing: .5px;
    }
    .detail-table td { padding: 10px 14px; border-bottom: 1px solid var(--border); }
    .detail-table tr:last-child td { border-bottom: none; }
    .detail-table tr:nth-child(even) td { background: #f9fafb; }
    .badge {
      display: inline-block;
      padding: 2px 10px;
      border-radius: 20px;
      font-size: 11px;
      font-weight: 700;
      background: #e8f5e9;
      color: var(--success);
    }

    /* ── Seções 3-7 ── */
    .p-section { margin-bottom: 20px; }
    .p-section-title {
      font-size: 13px; font-weight: 800; text-transform: uppercase;
      letter-spacing: .8px; color: var(--accent);
      border-left: 4px solid var(--primary);
      padding-left: 10px; margin-bottom: 12px;
    }
    .p-pay-grid { display: grid; grid-template-columns: repeat(3,1fr); gap: 12px; }
    @media (max-width:600px) { .p-pay-grid { grid-template-columns: 1fr; } }
    .p-pay-card {
      background: var(--bg); border-radius: 10px; padding: 14px 16px;
      border-top: 3px solid var(--primary);
    }
    .p-pay-card strong { display: block; font-size: 13px; color: var(--accent); margin-bottom: 6px; }
    .p-pay-card span { display: block; font-size: 12px; color: var(--muted); margin-top: 3px; }
    .p-pay-stage { display: flex; align-items: center; gap: 6px; font-size: 12px; color: var(--muted); margin-top: 4px; }
    .p-pay-stage::before { content:''; width:8px; height:8px; border-radius:50%; background:var(--primary); flex-shrink:0; }
    .p-timeline { display: flex; gap: 16px; flex-wrap: wrap; }
    .p-tl-item { flex:1; min-width:180px; background:var(--bg); border-radius:10px; padding:14px 16px; display:flex; align-items:center; gap:12px; }
    .p-tl-num { font-size:28px; font-weight:900; color:var(--primary); line-height:1; }
    .p-tl-desc { font-size:12px; color:var(--muted); }
    .p-tl-desc strong { display:block; color:var(--accent); font-size:13px; margin-bottom:2px; }
    .p-warranty-grid { display:grid; grid-template-columns:repeat(4,1fr); gap:10px; }
    @media (max-width:600px) { .p-warranty-grid { grid-template-columns:1fr 1fr; } }
    .p-warranty-card { background:var(--bg); border-radius:10px; padding:14px 12px; text-align:center; }
    .p-warranty-years { font-size:22px; font-weight:900; color:var(--accent); }
    .p-warranty-unit  { font-size:11px; color:var(--primary); font-weight:700; text-transform:uppercase; }
    .p-warranty-item  { font-size:11px; color:var(--muted); margin-top:4px; }
    .p-resp-grid { display:grid; grid-template-columns:1fr 1fr; gap:12px; }
    @media (max-width:600px) { .p-resp-grid { grid-template-columns:1fr; } }
    .p-resp-card { background:var(--bg); border-radius:10px; padding:14px 16px; }
    .p-resp-card strong { display:block; font-size:13px; color:var(--accent); margin-bottom:8px; }
    .p-resp-item { font-size:12px; color:var(--muted); padding:3px 0; border-bottom:1px solid var(--border); }
    .p-resp-item:last-child { border-bottom:none; }
    .p-validity { background:linear-gradient(135deg,var(--primary),var(--primary-dark)); color:#fff; border-radius:10px; padding:16px 24px; display:flex; align-items:center; justify-content:space-between; margin-bottom:20px; flex-wrap:wrap; gap:8px; }
    .p-validity .pv-label { font-size:13px; opacity:.9; }
    .p-validity .pv-days  { font-size:28px; font-weight:900; }

    /* ── Logo + Stats + Hero foto ── */
    .p-hero { display:flex; align-items:stretch; gap:0; margin-bottom:20px; border-radius:12px; overflow:hidden; box-shadow:0 2px 12px rgba(0,0,0,.1); }
    .p-hero-left { background:#fff; color:var(--accent); padding:16px 20px; display:flex; flex-direction:column; justify-content:space-between; min-width:220px; border-right:1px solid #eee; }
    .p-hero-logo-wrap { display:flex; align-items:center; justify-content:center; }
    .p-hero-logo-img  { max-width:160px; max-height:120px; object-fit:contain; display:block; }
    .p-hero-logo { font-size:28px; font-weight:900; letter-spacing:1px; }
    .p-hero-logo span { color:var(--primary); }
    .p-hero-tagline { font-size:10px; letter-spacing:2.5px; color:var(--primary); margin-top:2px; }
    .p-stats { display:flex; gap:24px; margin-top:16px; padding-top:14px; border-top:1px solid #eee; }
    .p-stat-value { font-size:20px; font-weight:900; color:var(--primary); }
    .p-stat-label { font-size:10px; color:var(--muted); margin-top:2px; }
    .p-hero-photo-wrap { flex:1; position:relative; min-height:140px; background:linear-gradient(135deg,#1a4a2e 0%,#2d7a3a 40%,#1a3c5e 100%); display:flex; align-items:center; justify-content:center; overflow:hidden; }
    .p-hero-photo { width:100%; height:100%; object-fit:cover; display:block; }
    .p-hero-photo-fallback { text-align:center; color:rgba(255,255,255,.4); font-size:32px; }
    @media (max-width:600px) { .p-hero { flex-direction:column; } .p-hero-photo-wrap { min-height:120px; } }

    .footer-note {
      margin-top: 24px;
      text-align: center;
      font-size: 11px;
      color: var(--muted);
      border-top: 1px solid var(--border);
      padding-top: 16px;
    }

    /* ── Buttons ── */
    .btn-wrap { grid-column: 1 / -1; display: flex; gap: 12px; justify-content: flex-end; }
    .btn {
      padding: 12px 28px;
      border-radius: 8px;
      font-size: 14px;
      font-weight: 700;
      border: none;
      cursor: pointer;
      transition: all .2s;
    }
    .btn-primary { background: var(--primary); color: #fff; }
    .btn-primary:hover { background: var(--primary-dark); }
    .btn-secondary { background: var(--accent); color: #fff; }
    .btn-secondary:hover { background: var(--accent-light); }
    .btn-outline { background: transparent; border: 2px solid var(--border); color: var(--muted); }
    .btn-outline:hover { border-color: var(--accent); color: var(--accent); }

    @page {
      size: A4;
      margin: 12mm 14mm;
    }

    @media print {
      * { -webkit-print-color-adjust: exact !important; print-color-adjust: exact !important; }

      body { background: #fff !important; }
      header, .container > .card:not(#preview), .btn-wrap, .vendedora-select { display: none !important; }

      .container {
        display: block !important;
        padding: 0 !important;
        margin: 0 !important;
      }

      #preview {
        display: block !important;
        box-shadow: none !important;
        border-radius: 0 !important;
        padding: 0 !important;
        margin: 0 !important;
      }

      /* Preserve gradient backgrounds */
      .economy-banner  { background: linear-gradient(135deg, #1a3c5e, #2a5a8a) !important; }
      .investment-banner { background: linear-gradient(135deg, #2d6a2d, #3a8a3a) !important; }
      .detail-table th { background: #1a3c5e !important; }
      .spec-box { background: #f4f6f9 !important; }

      /* Compact sizing for print */
      .proposal-header { margin-bottom: 16px; padding-bottom: 12px; }
      .proposal-logo { font-size: 24px; }
      .proposal-client { margin-bottom: 14px; }
      .proposal-client p { font-size: 15px; }

      .spec-grid {
        grid-template-columns: repeat(3, 1fr) !important;
        gap: 8px !important;
        margin-bottom: 12px !important;
      }
      .spec-box { padding: 10px 12px !important; break-inside: avoid; }
      .spec-box .spec-value { font-size: 15px !important; }

      .investment-banner,
      .economy-banner {
        padding: 14px 20px !important;
        margin-bottom: 10px !important;
        break-inside: avoid;
      }
      .eco-value, .inv-value { font-size: 22px !important; }

      /* Hide the detail table — visual summary is enough for the client */
      .detail-table-wrap { display: none !important; }

      .p-hero { border-radius: 8px !important; margin-bottom: 12px !important; }
      .p-hero-left { min-width: 180px !important; padding: 16px 20px !important; }
      .p-hero-logo { font-size: 22px !important; }
      .p-stat-value { font-size: 16px !important; }
      .p-hero-photo-wrap { min-height: 100px !important; }
      .p-client-banner { padding: 12px 18px !important; margin-bottom: 12px !important; }
      .p-client-name { font-size: 20px !important; }
      .p-pay-grid { grid-template-columns: repeat(3,1fr) !important; }
      .p-warranty-grid { grid-template-columns: repeat(4,1fr) !important; }
      .p-resp-grid { grid-template-columns: 1fr 1fr !important; }
      .p-section { margin-bottom: 12px !important; break-inside: avoid; }
      .p-validity { padding: 12px 18px !important; margin-bottom: 12px !important; break-inside: avoid; }
      .p-hero-left { background: #fff !important; border-right: 1px solid #ddd !important; }
      .p-pay-card, .p-tl-item, .p-warranty-card, .p-resp-card { background: #f4f6f9 !important; }
      .p-validity { background: linear-gradient(135deg,#f5a623,#d4891a) !important; }

      .footer-note { margin-top: 14px; padding-top: 10px; font-size: 10px; }
    }

    /* ── Redesign: New Proposal Sections ── */
    .p-page-hdr { display:flex; align-items:center; justify-content:space-between; margin-bottom:20px; padding-bottom:16px; border-bottom:3px solid var(--primary); gap:12px; }
    .p-logo-wrap { display:flex; align-items:center; gap:8px; }
    .p-logo-img { max-height:54px; max-width:150px; object-fit:contain; }
    .p-logo-fallback { font-size:22px; font-weight:900; color:var(--accent); letter-spacing:1px; }
    .p-logo-fallback span { color:var(--primary); }
    .p-hdr-meta { flex:1; text-align:center; font-size:12px; color:var(--muted); }
    .p-hdr-meta strong { display:block; font-size:14px; color:var(--text); margin-bottom:2px; }
    .p-proposal-badge { background:var(--accent); color:#fff; font-size:12px; font-weight:700; padding:8px 18px; border-radius:6px; white-space:nowrap; }

    .p-sec-hdr { display:flex; align-items:center; gap:10px; background:var(--accent); color:#fff; padding:10px 16px; margin:18px 0 12px; border-radius:6px; }
    .p-sec-sq { width:20px; height:20px; background:var(--primary); border-radius:3px; flex-shrink:0; }
    .p-sec-title { font-size:15px; font-weight:900; letter-spacing:1.5px; text-transform:uppercase; }

    .p-data-grid { display:grid; grid-template-columns:1fr 1fr; gap:0; border:1px solid var(--border); border-radius:8px; overflow:hidden; margin-bottom:14px; }
    .p-data-cell { padding:11px 16px; border-bottom:1px solid var(--border); display:flex; justify-content:space-between; align-items:center; background:#fff; }
    .p-data-cell:nth-last-child(-n+2) { border-bottom:none; }
    .p-data-lbl { font-size:12px; color:var(--muted); max-width:55%; }
    .p-data-val { font-size:15px; font-weight:800; color:var(--accent); white-space:nowrap; }
    .p-data-val.hi { color:var(--primary); }

    .p-res-grid { display:grid; grid-template-columns:1fr 1fr; gap:0; border:1px solid var(--border); border-radius:8px; overflow:hidden; margin-bottom:6px; }
    .p-res-cell { padding:11px 16px; border-bottom:1px solid var(--border); display:flex; justify-content:space-between; align-items:center; background:#fff; }
    .p-res-cell:nth-last-child(-n+2) { border-bottom:none; }
    .p-res-lbl { font-size:12px; color:var(--muted); }
    .p-res-val { font-size:15px; font-weight:800; color:var(--accent); }
    .p-res-val.hi { color:var(--primary); }

    .p-chart-wrap { background:#fafbfc; border:1px solid var(--border); border-radius:8px; padding:14px 16px; margin-bottom:18px; }
    .p-chart-title { font-size:13px; font-weight:700; color:var(--accent); text-align:center; margin-bottom:10px; }
    .p-chart-svg { display:block; width:100%; }
    .p-chart-legend { display:flex; justify-content:center; gap:20px; margin-top:8px; }
    .p-legend-dot { display:flex; align-items:center; gap:5px; font-size:11px; color:var(--muted); }
    .p-legend-sq { width:14px; height:10px; border-radius:2px; display:inline-block; }
    .p-asterisk-note { font-size:10px; color:var(--muted); font-style:italic; margin-bottom:14px; }

    .p-page-break { page-break-before:always; break-before:page; height:0; margin:0; }

    .p-big-sec-title { font-size:20px; font-weight:900; color:var(--accent); border-left:6px solid var(--primary); padding-left:12px; margin:20px 0 16px; text-transform:uppercase; letter-spacing:.5px; }
    .p-subsec { margin-bottom:14px; }
    .p-subsec-hdr { background:var(--bg); border-left:4px solid var(--accent); padding:7px 12px; font-size:11px; font-weight:800; color:var(--accent); text-transform:uppercase; letter-spacing:.8px; margin-bottom:8px; }
    .p-sys-grid { display:grid; grid-template-columns:1fr 1fr; gap:0; border:1px solid var(--border); border-radius:6px; overflow:hidden; font-size:13px; }
    .p-sys-cell { padding:8px 12px; border-bottom:1px solid var(--border); display:flex; justify-content:space-between; align-items:center; background:#fff; }
    .p-sys-cell:nth-last-child(-n+2) { border-bottom:none; }
    .p-sys-lbl { color:var(--muted); }
    .p-sys-val { font-weight:700; color:var(--accent); }
    .p-perf-grid { display:grid; grid-template-columns:1fr 1fr; gap:0; border:1px solid var(--border); border-radius:6px; overflow:hidden; font-size:13px; }
    .p-equip-wrap { font-size:13px; border:1px solid var(--border); border-radius:6px; overflow:hidden; }
    .p-equip-row { display:flex; gap:8px; padding:8px 12px; border-bottom:1px solid var(--border); background:#fff; align-items:baseline; }
    .p-equip-row:last-child { border-bottom:none; }
    .p-equip-key { color:var(--muted); min-width:130px; flex-shrink:0; }
    .p-equip-val { font-weight:700; color:var(--accent); flex:1; }
    .p-equip-guar { font-size:11px; color:var(--muted); font-style:italic; }
    .p-equip-note { font-size:12px; color:var(--muted); font-style:italic; padding:8px 12px; border-top:1px solid var(--border); background:#fafbfc; }
    .p-services { font-size:13px; color:var(--text); line-height:1.9; border:1px solid var(--border); border-radius:6px; padding:10px 14px; background:#fff; }

    .p-crono-wrap { margin-bottom:16px; }
    .p-crono-steps { display:flex; align-items:flex-start; padding:16px 0 8px; }
    .p-crono-step { flex:1; display:flex; flex-direction:column; align-items:center; position:relative; }
    .p-crono-step:not(:last-child)::after { content:''; position:absolute; top:18px; left:calc(50% + 19px); right:calc(-50% + 19px); height:2px; background:var(--primary); }
    .p-crono-dot { width:38px; height:38px; border-radius:50%; background:var(--accent); color:#fff; font-size:15px; font-weight:800; display:flex; align-items:center; justify-content:center; margin-bottom:8px; position:relative; z-index:1; flex-shrink:0; border:3px solid #fff; box-shadow:0 0 0 2px var(--primary); }
    .p-crono-body { text-align:center; padding:0 4px; }
    .p-crono-title { font-size:11px; font-weight:700; color:var(--accent); line-height:1.3; }
    .p-crono-time { font-size:10px; color:var(--primary); font-weight:700; margin-top:3px; }
    .p-crono-sub { font-size:9px; color:var(--muted); margin-top:1px; }

    @media print {
      .p-sec-hdr { background:#1a3c5e !important; }
      .p-data-cell, .p-res-cell, .p-sys-cell, .p-equip-row { background:#fff !important; }
      .p-chart-wrap { background:#fafbfc !important; }
      .p-subsec-hdr { background:#f4f6f9 !important; }
      .p-crono-dot { background:#1a3c5e !important; box-shadow:0 0 0 2px #f5a623 !important; }
      .p-page-break { page-break-before:always !important; }
      .p-services { background:#fff !important; }
      .p-equip-note { background:#f4f6f9 !important; }
    }
  </style>
</head>
<body>

<header>
  <div>
    <div class="logo">ENER<span>TUR</span></div>
    <p>Energia Solar &mdash; Gerador de Propostas</p>
  </div>
</header>

<div class="container">

  <!-- ── Cliente ── -->
  <div class="card">
    <h2>Dados do Cliente</h2>

    <div class="field">
      <label>Nome / Empresa</label>
      <input id="clientName" type="text" placeholder="Ex: João Silva" />
    </div>
    <div class="field">
      <label>Endereço</label>
      <input id="clientAddr" type="text" placeholder="Rua, número, cidade" />
    </div>
    <div class="field">
      <label>Conta de Energia Mensal (R$)</label>
      <input id="billValue" type="number" min="0" step="0.01" placeholder="Ex: 800" />
    </div>
    <div class="row">
      <div class="field">
        <label>Consumo Atual (kWh/mês)</label>
        <input id="consumoAtual" type="number" min="0" step="1" placeholder="Ex: 900" />
      </div>
      <div class="field">
        <label>Tarifa (R$/kWh)</label>
        <input id="tarifa" type="number" min="0" step="0.001" placeholder="Ex: 0,85" />
      </div>
    </div>
    <div class="field">
      <label>Validade da Proposta (dias)</label>
      <input id="validityDays" type="number" min="1" step="1" value="15" placeholder="Ex: 15" />
    </div>
    <div class="field">
      <label>Tipo de Instalação</label>
      <div class="radio-group">
        <label><input type="radio" name="installType" value="Residencial" checked /> Residencial</label>
        <label><input type="radio" name="installType" value="Industrial" /> Industrial</label>
        <label><input type="radio" name="installType" value="Condomínio" /> Condomínio</label>
      </div>
    </div>
    <div class="field">
      <label>Padrão de Conexão</label>
      <div class="radio-group">
        <label><input type="radio" name="conexaoType" value="Monofásico" checked /> Monofásico <span style="font-size:11px;color:#aaa">(mín. 30 kWh)</span></label>
        <label><input type="radio" name="conexaoType" value="Bifásico" /> Bifásico <span style="font-size:11px;color:#aaa">(mín. 50 kWh)</span></label>
        <label><input type="radio" name="conexaoType" value="Trifásico" /> Trifásico <span style="font-size:11px;color:#aaa">(mín. 100 kWh)</span></label>
      </div>
    </div>
  </div>

  <!-- ── Sistema ── -->
  <div class="card">
    <h2>Sistema Solar</h2>

    <div class="row">
      <div class="field">
        <label>Módulos QTD</label>
        <input id="modQty" type="number" min="1" step="1" placeholder="Ex: 10" />
      </div>
      <div class="field">
        <label>Potência do Módulo (W)</label>
        <input id="modPower" type="number" min="1" step="1" placeholder="Ex: 550" />
      </div>
    </div>
    <div class="field">
      <label>Modelo do Módulo</label>
      <input id="modModel" type="text" placeholder="Ex: Canadian Solar HiKu6 550W" />
    </div>

    <div class="row">
      <div class="field">
        <label>Potência Total (kVp) <span style="font-weight:400;text-transform:none;color:#aaa">· calculado, editável</span></label>
        <input id="totalPower" type="text" placeholder="Ex: 9,35 kVp" />
      </div>
      <div class="field">
        <label>Geração Mensal (kWh) <span style="font-weight:400;text-transform:none;color:#aaa">· calculado, editável</span></label>
        <input id="monthlyGen" type="text" placeholder="Ex: 960 kWh" />
      </div>
    </div>

    <div class="row">
      <div class="field">
        <label>Inversores QTD</label>
        <input id="invQty" type="number" min="1" step="1" placeholder="Ex: 1" />
      </div>
      <div class="field">
        <label>Potência do Inversor (kW)</label>
        <input id="invPower" type="number" min="0" step="0.1" placeholder="Ex: 5" />
      </div>
    </div>
    <div class="field">
      <label>Modelo / Marca do Inversor</label>
      <input id="invModel" type="text" placeholder="Ex: Fronius Symo 5kW" />
    </div>

    <div class="field">
      <label>Valor Total do Projeto (R$)</label>
      <input id="projectValue" type="number" min="0" step="0.01" placeholder="Ex: 25000" />
    </div>

    <!-- Bateria -->
    <div class="toggle-wrap">
      <label class="toggle">
        <input type="checkbox" id="hasBattery" />
        <span class="slider"></span>
      </label>
      <span class="toggle-label">Inclui Bateria</span>
    </div>
    <div id="batteryField" style="display:none">
      <div class="field">
        <label>Armazenamento da Bateria (kWh)</label>
        <input id="batteryKwh" type="number" min="0" step="0.1" placeholder="Ex: 10" />
      </div>
      <div class="field">
        <label>Modelo da Bateria</label>
        <input id="batModel" type="text" placeholder="Ex: Pylontech US5000 5.12 kWh" />
      </div>
      <div class="field">
        <label>Descrição / Observações da Bateria</label>
        <textarea id="batDesc" rows="3" placeholder="Ex: Bateria de lítio LiFePO4, ciclo de vida longo, monitoramento via app..." style="width:100%;padding:10px;border:1px solid var(--border);border-radius:8px;font-family:inherit;font-size:14px;resize:vertical"></textarea>
      </div>
    </div>
  </div>
  <!-- ── Vendedora ── -->
  <div class="field vendedora-select" style="margin-top:8px">
    <label>Consultor(a) Responsável</label>
    <div class="radio-group">
      <label><input type="radio" name="vendedora" value="Hingrid Oliveira|(11) 95860-4828" checked /> Hingrid Oliveira</label>
      <label><input type="radio" name="vendedora" value="Lucas Vieira|(11) 94556-0188" /> Lucas Vieira</label>
    </div>
  </div>

  
  <!-- ── Buttons ── -->
  <div class="btn-wrap">
    <button class="btn btn-outline" onclick="resetForm()">Limpar</button>
    <button class="btn btn-secondary" onclick="generateProposal()">Gerar Proposta</button>
    <button class="btn btn-primary" onclick="window.print()">Imprimir / PDF</button>
  </div>

  <!-- ── Preview ── -->
  <div id="preview" class="card full">
    <!-- filled by JS -->
  </div>

</div>

<script>
  // ── Auto-calculate (fills only if field is empty or was auto-filled) ──
  let autoFilled = { totalPower: false, monthlyGen: false };

  function recalc() {
    const qty = parseFloat(document.getElementById('modQty').value) || 0;
    const pw  = parseFloat(document.getElementById('modPower').value) || 0;

    if (qty > 0 && pw > 0) {
      const kVp    = (qty * pw / 1000).toFixed(2);
      const genKwh = (qty * 60).toFixed(0);
      const tpEl   = document.getElementById('totalPower');
      const mgEl   = document.getElementById('monthlyGen');
      if (!tpEl.value || autoFilled.totalPower)  { tpEl.value = kVp + ' kVp';   autoFilled.totalPower  = true; }
      if (!mgEl.value || autoFilled.monthlyGen)  { mgEl.value = genKwh + ' kWh'; autoFilled.monthlyGen = true; }
    }
  }

  ['modQty', 'modPower'].forEach(id =>
    document.getElementById(id).addEventListener('input', recalc)
  );

  // If user manually edits the calculated fields, mark them as manual
  ['totalPower', 'monthlyGen'].forEach(id =>
    document.getElementById(id).addEventListener('input', () => { autoFilled[id] = false; })
  );

  // ── Battery toggle ──────────────────────────────────────────────
  document.getElementById('hasBattery').addEventListener('change', function () {
    document.getElementById('batteryField').style.display = this.checked ? '' : 'none';
  });

  // ── Moeda brasileira ────────────────────────────────────────────
  function fmtBRL(val) {
    if (!val && val !== 0) return '—';
    return 'R$\u00a0' + Number(val).toLocaleString('pt-BR', {minimumFractionDigits:2, maximumFractionDigits:2});
  }

  // ── Generate proposal ───────────────────────────────────────────
  function generateProposal() {
    const get   = id => document.getElementById(id).value.trim();
    const getN  = id => parseFloat(document.getElementById(id).value) || 0;

    const name      = get('clientName') || 'Cliente';
    const addr      = get('clientAddr');
    const bill      = getN('billValue');
    const modQty    = getN('modQty');
    const modPower  = getN('modPower');
    const modModel  = get('modModel') || '—';
    const invQty    = getN('invQty');
    const invPower  = getN('invPower');
    const invModel  = get('invModel') || '—';
    const hasBat    = document.getElementById('hasBattery').checked;
    const batKwh    = getN('batteryKwh');
    const batModel  = get('batModel');
    const batDesc   = get('batDesc');
    const instType    = document.querySelector('input[name=installType]:checked').value;
    const conexaoType = document.querySelector('input[name=conexaoType]:checked').value;
    const projectVal  = getN('projectValue');
    const [vendNome, vendFone] = document.querySelector('input[name=vendedora]:checked').value.split('|');
    const validity  = parseInt(document.getElementById('validityDays').value) || 15;

    const kVp        = modQty && modPower ? (modQty * modPower / 1000).toFixed(2) : '—';
    const genKwhNum  = parseFloat(get('monthlyGen')) || (modQty * 60);
    const genKwh     = get('monthlyGen') || (modQty ? modQty * 60 + ' kWh' : '—');
    const totalPwDisp = get('totalPower') || (kVp !== '—' ? kVp + ' kVp' : '—');

    // Mínimo faturado por padrão de conexão
    const minKwhMap  = { 'Monofásico': 30, 'Bifásico': 50, 'Trifásico': 100 };
    const minKwh     = minKwhMap[conexaoType] || 30;
    const consumoAtual = getN('consumoAtual');
    const tarifa       = getN('tarifa');

    // Economia = (consumo antigo - mínimo faturado) × tarifa
    const ecoMonthly = (consumoAtual && tarifa)
      ? Math.max(0, (consumoAtual - minKwh) * tarifa)
      : 0;
    const ecoAnual   = ecoMonthly * 12;

    // Payback = investimento total ÷ economia anual
    const paybackYears = (projectVal && ecoAnual) ? projectVal / ecoAnual : null;
    const paybackStr = paybackYears
      ? (() => {
          const anos   = Math.floor(paybackYears);
          const meses  = Math.round((paybackYears - anos) * 12);
          if (anos === 0) return meses + ' meses';
          if (meses === 0) return anos + ' anos';
          return anos + ' anos e ' + meses + ' meses';
        })()
      : null;

    const today = new Date().toLocaleDateString('pt-BR');
    const preview = document.getElementById('preview');

    // ── New calculations ──────────────────────────────────────────
    // Minimum billed after solar
    const newBill = (tarifa && minKwh) ? (minKwh * tarifa) : 0;
    // Economy = current bill - new bill (or use consumption-based formula if available)
    const ecoMonthlyDisp = ecoMonthly; // reuse existing formula
    const ecoAnual1st = ecoMonthly * 12;
    const reduction = bill > 0 ? Math.round(ecoMonthly / bill * 100) : 0;
    const despesaEsseAno = bill * 12;
    const novaFaturaDisp = newBill || (bill && ecoMonthly ? bill - ecoMonthly : 0);

    // 25-year projection (7% annual tariff growth)
    const GROWTH = 0.07;
    let expense25Before = 0, expense25After = 0;
    const chartData = [];
    const curYear = new Date().getFullYear();
    for (let i = 0; i < 25; i++) {
      const mult = Math.pow(1 + GROWTH, i);
      const bef = bill * 12 * mult;
      const aft = novaFaturaDisp * 12 * mult;
      expense25Before += bef;
      expense25After  += aft;
      chartData.push({ before: bef, after: aft, year: curYear + i });
    }
    const savings25 = expense25Before - expense25After;

    // System data
    const area = modQty ? Math.round(modQty * 2.5) : 0;
    const invTotalPower = invQty && invPower ? (invQty * invPower).toFixed(2) : '—';
    const genAnual1st = genKwhNum ? Math.round(genKwhNum * 12) : 0;

    // ── SVG bar chart (Comparativo de Faturas) ────────────────────
    const chartW = 480, chartH = 160, marginL = 48, marginB = 22;
    const plotW = chartW - marginL - 8;
    const plotH = chartH - marginB - 6;
    const maxVal = chartData.reduce((m, d) => Math.max(m, d.before), 1);
    const grpW = plotW / 25;
    const barW = Math.max(3, grpW * 0.36);

    let svgBars = '';
    chartData.forEach((d, i) => {
      const x = marginL + i * grpW;
      const hB = (d.before / maxVal) * plotH;
      const hA = (d.after  / maxVal) * plotH;
      const yB = chartH - marginB - hB;
      const yA = chartH - marginB - hA;
      svgBars += `<rect x="${(x + grpW*0.05).toFixed(1)}" y="${yB.toFixed(1)}" width="${barW.toFixed(1)}" height="${hB.toFixed(1)}" fill="#c0392b" rx="1"/>`;
      svgBars += `<rect x="${(x + grpW*0.05 + barW + 1).toFixed(1)}" y="${yA.toFixed(1)}" width="${barW.toFixed(1)}" height="${hA.toFixed(1)}" fill="#f4a4a4" rx="1"/>`;
      if (i % 5 === 0 || i === 24) {
        svgBars += `<text x="${(x + grpW*0.5).toFixed(1)}" y="${(chartH - 5).toFixed(1)}" font-size="8" fill="#888" text-anchor="middle">${d.year}</text>`;
      }
    });

    let svgAxes = `<line x1="${marginL}" y1="${6}" x2="${marginL}" y2="${chartH - marginB}" stroke="#ddd" stroke-width="1"/>`;
    svgAxes += `<line x1="${marginL}" y1="${chartH - marginB}" x2="${chartW - 8}" y2="${chartH - marginB}" stroke="#ddd" stroke-width="1"/>`;
    for (let t = 1; t <= 4; t++) {
      const val = (maxVal / 4) * t;
      const y = chartH - marginB - (val / maxVal) * plotH;
      const lbl = val >= 10000 ? 'R$' + Math.round(val/1000) + 'k' : 'R$' + Math.round(val);
      svgAxes += `<line x1="${marginL}" y1="${y.toFixed(1)}" x2="${chartW - 8}" y2="${y.toFixed(1)}" stroke="#eee" stroke-width="1"/>`;
      svgAxes += `<text x="${marginL - 3}" y="${(y + 3).toFixed(1)}" font-size="8" fill="#999" text-anchor="end">${lbl}</text>`;
    }

    const svgChart = `<svg viewBox="0 0 ${chartW} ${chartH}" class="p-chart-svg" style="height:${chartH}px;max-width:100%">${svgAxes}${svgBars}</svg>`;

    // ── Proposal HTML ─────────────────────────────────────────────
    preview.innerHTML = `
      <!-- ── CABEÇALHO ── -->
      <div class="p-page-hdr">
        <div class="p-logo-wrap">
          <img src="logo.png" class="p-logo-img" alt="Enertur"
               onerror="this.style.display='none';this.nextElementSibling.style.display='block'">
          <div class="p-logo-fallback" style="display:none">ENER<span>TUR</span></div>
        </div>
        <div class="p-hdr-meta">
          <strong>${name}</strong>
          ${addr ? addr + '<br>' : ''}Proposta Solar &middot; ${today}
        </div>
        <div class="p-proposal-badge">Proposta Solar</div>
      </div>

      <!-- ── SITUAÇÃO ATUAL ── -->
      <div class="p-sec-hdr">
        <div class="p-sec-sq"></div>
        <div class="p-sec-title">Situação Atual</div>
      </div>
      <div class="p-data-grid">
        <div class="p-data-cell">
          <span class="p-data-lbl">Consumo mensal:</span>
          <span class="p-data-val">${consumoAtual ? consumoAtual + ' kWh' : '—'}</span>
        </div>
        <div class="p-data-cell">
          <span class="p-data-lbl">Despesa esse ano:</span>
          <span class="p-data-val hi">${bill ? fmtBRL(despesaEsseAno) : '—'}</span>
        </div>
        <div class="p-data-cell">
          <span class="p-data-lbl">Fatura mensal (sem solar):</span>
          <span class="p-data-val">${bill ? fmtBRL(bill) : '—'}</span>
        </div>
        <div class="p-data-cell">
          <span class="p-data-lbl">Despesa em 25 anos (se nada for feito):</span>
          <span class="p-data-val hi">${bill ? fmtBRL(expense25Before) : '—'}</span>
        </div>
      </div>

      <!-- ── RESULTADOS ESPERADOS ── -->
      <div class="p-sec-hdr">
        <div class="p-sec-sq"></div>
        <div class="p-sec-title">Resultados Esperados</div>
      </div>
      <div class="p-res-grid">
        <div class="p-res-cell">
          <span class="p-res-lbl">*Geração mensal:</span>
          <span class="p-res-val">${genKwh || '—'}</span>
        </div>
        <div class="p-res-cell">
          <span class="p-res-lbl">Economia no 1° ano:</span>
          <span class="p-res-val hi">${ecoAnual1st ? fmtBRL(ecoAnual1st) : '—'}</span>
        </div>
        <div class="p-res-cell">
          <span class="p-res-lbl">*Fatura mensal:</span>
          <span class="p-res-val">${novaFaturaDisp ? fmtBRL(novaFaturaDisp) : '—'}</span>
        </div>
        <div class="p-res-cell">
          <span class="p-res-lbl">Economia em 25 anos:</span>
          <span class="p-res-val hi">${savings25 ? fmtBRL(savings25) : '—'}</span>
        </div>
        <div class="p-res-cell">
          <span class="p-res-lbl">*Economia mensal:</span>
          <span class="p-res-val">${ecoMonthly ? fmtBRL(ecoMonthly) : '—'}</span>
        </div>
        <div class="p-res-cell">
          <span class="p-res-lbl">*Redução:</span>
          <span class="p-res-val hi">${reduction ? reduction + '%' : '—'}</span>
        </div>
      </div>
      <div class="p-asterisk-note">*Médias dos primeiros 12 meses de funcionamento do sistema.</div>

      <!-- ── GRÁFICO ── -->
      <div class="p-chart-wrap">
        <div class="p-chart-title">Comparativo de Faturas</div>
        ${svgChart}
        <div class="p-chart-legend">
          <span class="p-legend-dot"><span class="p-legend-sq" style="background:#c0392b"></span> Faturas antes</span>
          <span class="p-legend-dot"><span class="p-legend-sq" style="background:#f4a4a4"></span> Faturas depois</span>
        </div>
      </div>

      <!-- ── PAGE BREAK → SOLUÇÃO PROPOSTA ── -->
      <div class="p-page-break"></div>

      <!-- ── SOLUÇÃO PROPOSTA ── -->
      <div class="p-big-sec-title">Solução Proposta</div>

      <div class="p-subsec">
        <div class="p-subsec-hdr">Dados do Sistema</div>
        <div class="p-sys-grid">
          <div class="p-sys-cell"><span class="p-sys-lbl">Número de módulos:</span><span class="p-sys-val">${modQty || '—'}</span></div>
          <div class="p-sys-cell"><span class="p-sys-lbl">Potência-pico total:</span><span class="p-sys-val">${kVp !== '—' ? kVp + ' kWp' : '—'}</span></div>
          <div class="p-sys-cell"><span class="p-sys-lbl">Módulos de:</span><span class="p-sys-val">${modPower ? modPower + ' Wp' : '—'}</span></div>
          <div class="p-sys-cell"><span class="p-sys-lbl">Potência de inversores:</span><span class="p-sys-val">${invTotalPower !== '—' ? invTotalPower + ' kW' : '—'}</span></div>
          <div class="p-sys-cell"><span class="p-sys-lbl">Área necessária:</span><span class="p-sys-val">${area ? area + ' m²' : '—'}</span></div>
          <div class="p-sys-cell"><span class="p-sys-lbl">Tipo de instalação:</span><span class="p-sys-val">${instType}</span></div>
        </div>
      </div>

      <div class="p-subsec">
        <div class="p-subsec-hdr">Desempenho do Sistema</div>
        <div class="p-perf-grid" style="border:1px solid var(--border);border-radius:6px;overflow:hidden;font-size:13px;">
          <div class="p-sys-cell"><span class="p-sys-lbl">Rendimento global:</span><span class="p-sys-val">80%</span></div>
          <div class="p-sys-cell"><span class="p-sys-lbl">Geração no 1° ano:</span><span class="p-sys-val">${genAnual1st ? genAnual1st.toLocaleString('pt-BR') + ' kWh' : '—'}</span></div>
        </div>
      </div>

      <div class="p-subsec">
        <div class="p-subsec-hdr">Principais Equipamentos e Materiais Inclusos</div>
        <div class="p-equip-wrap">
          <div class="p-equip-row">
            <span class="p-equip-key">Módulo:</span>
            <span class="p-equip-val">${modModel}</span>
            <span class="p-equip-guar">(15/30 anos de Garantia)</span>
          </div>
          <div class="p-equip-row">
            <span class="p-equip-key">Inversor:</span>
            <span class="p-equip-val">${invModel}${invPower ? ' · ' + invPower + ' kW' : ''}</span>
            <span class="p-equip-guar">(10 anos de Garantia, 3 MPPTs)</span>
          </div>
          <div class="p-equip-row">
            <span class="p-equip-key">Estr. de fixação:</span>
            <span class="p-equip-val">Conforme projeto</span>
            <span class="p-equip-guar">(5 anos de Garantia)</span>
          </div>
          ${hasBat ? `<div class="p-equip-row">
            <span class="p-equip-key">Bateria:</span>
            <span class="p-equip-val">${batModel || 'Bateria'} · ${batKwh} kWh</span>
            <span class="p-equip-guar">(Garantia conforme fabricante)</span>
          </div>` : ''}
        </div>
        <div class="p-equip-note">Estão inclusos na proposta a estrutura de fixação e todo material necessário para instalação e perfeito funcionamento do sistema.</div>
      </div>

      <div class="p-subsec">
        <div class="p-subsec-hdr">Serviços Inclusos <span style="font-weight:400;font-style:italic">(1 ano de Garantia)</span></div>
        <div class="p-services">
          <div>&#8211; Análise e dimensionamento do sistema</div>
          <div>&#8211; Elaboração do projeto</div>
          <div>&#8211; Emissão de Anotação de Responsabilidade Técnica (ART) de projeto e instalação</div>
          <div>&#8211; Aprovação do projeto e toda a documentação necessária junto à distribuidora - Homologação</div>
          <div>&#8211; Instalação dos módulos com estruturas apropriadas</div>
          <div>&#8211; Intsalação e testes do sistema</div>
          <div>&#8211; Suporte técnico pós-instalação</div>
        </div>
      </div>

      ${projectVal ? `
      <div class="investment-banner" style="margin-top:14px">
        <div>
          <div class="inv-label">Valor Total do Investimento</div>
          <div class="inv-value">${fmtBRL(projectVal)}</div>
          <div class="inv-sub">${paybackStr ? 'Retorno estimado em ' + paybackStr : ''}</div>
        </div>
        ${paybackStr ? '<div style="text-align:right"><div style="font-size:12px;opacity:.75">Payback estimado</div><div style="font-size:22px;font-weight:800;color:#a8f0a8">' + paybackStr + '</div></div>' : ''}
      </div>` : ''}

      <!-- ── PAGE BREAK → CRONOGRAMA + CONDIÇÕES ── -->
      <div class="p-page-break"></div>

      <!-- ── CRONOGRAMA DE ENTREGA ── -->
      <div class="p-sec-hdr">
        <div class="p-sec-sq"></div>
        <div class="p-sec-title">Cronograma de Entrega</div>
      </div>
      <div class="p-crono-wrap">
        <div class="p-crono-steps">
          <div class="p-crono-step">
            <div class="p-crono-dot">1</div>
            <div class="p-crono-body">
              <div class="p-crono-title">Assinatura do Contrato</div>
              <div class="p-crono-sub">Entrada &amp; confirmação</div>
            </div>
          </div>
          <div class="p-crono-step">
            <div class="p-crono-dot">2</div>
            <div class="p-crono-body">
              <div class="p-crono-title">Pedido dos Equipamentos</div>
              <div class="p-crono-time">D+3 dias úteis</div>
            </div>
          </div>
          <div class="p-crono-step">
            <div class="p-crono-dot">3</div>
            <div class="p-crono-body">
              <div class="p-crono-title">Entrega dos Equipamentos</div>
              <div class="p-crono-time">~20 dias úteis</div>
              <div class="p-crono-sub">a partir do pedido</div>
            </div>
          </div>
          <div class="p-crono-step">
            <div class="p-crono-dot">4</div>
            <div class="p-crono-body">
              <div class="p-crono-title">Instalação</div>
              <div class="p-crono-time">~20 dias úteis</div>
              <div class="p-crono-sub">condicionado ao clima</div>
            </div>
          </div>
          <div class="p-crono-step">
            <div class="p-crono-dot">5</div>
            <div class="p-crono-body">
              <div class="p-crono-title">Homologação junto à Distribuidora</div>
              <div class="p-crono-time">30 a 90 dias</div>
              <div class="p-crono-sub">conforme concessionária</div>
            </div>
          </div>
          <div class="p-crono-step">
            <div class="p-crono-dot">6</div>
            <div class="p-crono-body">
              <div class="p-crono-title">Ativação do Sistema</div>
              <div class="p-crono-sub">Início da geração</div>
            </div>
          </div>
        </div>
      </div>

      <!-- ── FORMAS DE PAGAMENTO ── -->
      <div class="p-section">
        <div class="p-section-title">Formas de Pagamento</div>
        <div class="p-pay-grid">
          <div class="p-pay-card">
            <strong>&#128181; Dinheiro / Pix / Boleto</strong>
            <div class="p-pay-stage">70% na assinatura do contrato</div>
            <div class="p-pay-stage">15% na entrega dos equipamentos</div>
            <div class="p-pay-stage">15% após conclusão da instalação</div>
          </div>
          <div class="p-pay-card">
            <strong>&#128179; Cartão de Crédito</strong>
            <span>Até 12x com juros</span>
            <span>Ou até 21x com juros</span>
          </div>
          <div class="p-pay-card">
            <strong>&#127981; Financiamento Bancário</strong>
            <span>Sujeito a consulta e análise de crédito</span>
          </div>
        </div>
      </div>

      <!-- ── GARANTIAS ── -->
      <div class="p-section">
        <div class="p-section-title">Garantias</div>
        <div class="p-warranty-grid">
          <div class="p-warranty-card">
            <div class="p-warranty-years">25</div>
            <div class="p-warranty-unit">Anos</div>
            <div class="p-warranty-item">Eficiência dos painéis solares</div>
          </div>
          <div class="p-warranty-card">
            <div class="p-warranty-years">12</div>
            <div class="p-warranty-unit">Anos</div>
            <div class="p-warranty-item">Microinversores</div>
          </div>
          <div class="p-warranty-card">
            <div class="p-warranty-years">10</div>
            <div class="p-warranty-unit">Anos</div>
            <div class="p-warranty-item">Inversor String</div>
          </div>
          <div class="p-warranty-card">
            <div class="p-warranty-years">6</div>
            <div class="p-warranty-unit">Meses</div>
            <div class="p-warranty-item">Mão de obra</div>
          </div>
        </div>
      </div>

      <!-- ── RESPONSABILIDADES ── -->
      <div class="p-section">
        <div class="p-section-title">Responsabilidades</div>
        <div class="p-resp-grid">
          <div class="p-resp-card">
            <strong>Enertur</strong>
            <div class="p-resp-item">Projeto técnico e elétrico</div>
            <div class="p-resp-item">Fornecimento e instalação dos equipamentos</div>
            <div class="p-resp-item">Homologação junto à concessionária</div>
            <div class="p-resp-item">Suporte técnico pós-instalação</div>
          </div>
          <div class="p-resp-card">
            <strong>Cliente</strong>
            <div class="p-resp-item">Acesso ao local de instalação</div>
            <div class="p-resp-item">Documentos do titular da fatura (para homologação)</div>
            <div class="p-resp-item">Conta de energia atualizada</div>
            <div class="p-resp-item">Infraestrutura civil, se necessária</div>
          </div>
        </div>
      </div>

      <!-- ── VALIDADE ── -->
      <div class="p-validity">
        <div>
          <div class="pv-label">Validade desta proposta</div>
          <div class="pv-days">${validity} dias</div>
        </div>
        <div style="text-align:right;font-size:12px;opacity:.85">
          Válida até ${new Date(Date.now()+validity*864e5).toLocaleDateString('pt-BR')}
        </div>
      </div>

      <div class="footer-note">
        Esta proposta é de caráter informativo. Valores de geração e economia são estimados com base nos dados fornecidos.<br>
        <strong>Enertur Energia Solar</strong> &mdash; Gerado em ${today}<br>
        <span style="margin-top:6px;display:inline-block">
          Consultor(a): <strong>${vendNome}</strong> &nbsp;·&nbsp; ${vendFone}
        </span>
      </div>
    `;
    preview.classList.add('visible');
    preview.scrollIntoView({ behavior: 'smooth' });
  }

  // ── Reset ───────────────────────────────────────────────────────
  function resetForm() {
    document.querySelectorAll('input:not([type=radio]):not([type=checkbox])').forEach(i => { i.value = ''; });
    autoFilled = { totalPower: false, monthlyGen: false };
    document.querySelector('input[name=installType][value="Residencial"]').checked = true;
    document.getElementById('hasBattery').checked = false;
    document.getElementById('batteryField').style.display = 'none';
    document.getElementById('preview').classList.remove('visible');
  }
</script>
</body>
</html>
